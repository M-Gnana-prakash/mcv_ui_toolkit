<div class="mcv-checkbox-wrapper">
  <div class="mcv-checkbox-row" (click)="toggle()" [class.disabled]="disabled">

    <!-- Checkbox Visual -->
    <div class="mcv-checkbox-box" [ngClass]="{
                'box-sm': computedStyles.sizeVariant === 'sm',
                'box-md': computedStyles.sizeVariant === 'md',
                'box-lg': computedStyles.sizeVariant === 'lg'
             }" [style.border]="value ? ('1px solid ' + computedStyles.selectedColor) : computedStyles.borderStyle"
      [style.background-color]="value ? computedStyles.selectedColor : computedStyles.backgroundColor">

      @if (value) {
      <svg style="color: white; fill: none;" [ngClass]="{
                        'icon-sm': computedStyles.sizeVariant === 'sm',
                        'icon-md': computedStyles.sizeVariant === 'md',
                        'icon-lg': computedStyles.sizeVariant === 'lg'
                     }" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
      }
    </div>

    <!-- Hidden Input -->
    <input type="checkbox" [checked]="value" [disabled]="disabled" [required]="required"
      (change)="onInputChange($event)" (focus)="isFocused = true" (blur)="isFocused = false" class="mcv-hidden-input" />

    <!-- Label -->
    @if (label) {
    <span class="mcv-checkbox-label" [style.color]="computedStyles.labelColor" [ngClass]="{
                    'text-sm': computedStyles.sizeVariant === 'sm',
                    'text-md': computedStyles.sizeVariant === 'md',
                    'text-lg': computedStyles.sizeVariant === 'lg'
                  }">
      {{ label }}
    </span>
    }
  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>
</div>
