<div class="mcv-field-wrapper">

    @if (label) {
    <label class="mcv-label" [ngClass]="{
            'size-sm': computedStyles.sizeVariant === 'sm',
            'size-md': computedStyles.sizeVariant === 'md',
            'size-lg': computedStyles.sizeVariant === 'lg'
        }">
        {{ label }} @if(required){<span class="required-star">*</span>}
    </label>
    }

    <div class="mcv-input-container"
        [style.border]="isFocused ? computedStyles.activeBorderStyle : computedStyles.borderStyle"
        [style.outline]="isFocused ? computedStyles.activeOutline : computedStyles.outline"
        [style.background-color]="isFocused ? computedStyles.activeBackgroundColor : computedStyles.backgroundColor">

        <input [type]="format === 'yyyy-MM-dd' ? 'date' : 'text'" [value]="value" [placeholder]="placeholder || format"
            [disabled]="disabled" [readOnly]="readonly" [min]="normalizedMin" [max]="normalizedMax"
            (input)="onInputChange($event)" (change)="onInputChange($event)" (focus)="isFocused = true"
            (blur)="onBlur()" class="mcv-date-input" [ngClass]="{
                 'size-sm': computedStyles.sizeVariant === 'sm',
                 'size-md': computedStyles.sizeVariant === 'md',
                 'size-lg': computedStyles.sizeVariant === 'lg'
               }" [style.color]="isFocused ? computedStyles.activeTextColor : computedStyles.textColor" />
    </div>

    <!-- Validation -->
    <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
    </mcv-field-errors>
</div>
