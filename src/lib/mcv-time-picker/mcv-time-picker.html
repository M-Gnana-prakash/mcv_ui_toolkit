<div class="flex flex-col w-full gap-1">

  @if (label) {
  <label [class]="{
            'text-xs': computedStyles.sizeVariant === 'sm',
            'text-sm': computedStyles.sizeVariant === 'md',
            'text-base': computedStyles.sizeVariant === 'lg'
        }" class="font-medium text-gray-700 dark:text-gray-300 mb-1">
    {{ label }} @if(required){<span class="text-red-500">*</span>}
  </label>
  }

  <div class="flex items-center w-full rounded transition-all duration-200"
    [style.border]="isFocused ? computedStyles.activeBorderStyle : computedStyles.borderStyle"
    [style.outline]="isFocused ? computedStyles.activeOutline : computedStyles.outline"
    [style.background-color]="isFocused ? computedStyles.activeBackgroundColor : computedStyles.backgroundColor">

    <input type="time" [value]="value" [placeholder]="placeholder" [disabled]="disabled" [readOnly]="readonly"
      [min]="min" [max]="max" (input)="onInputChange($event)" (focus)="isFocused = true" (blur)="onBlur()"
      class="w-full bg-transparent border-none focus:outline-none" [ngClass]="{
                 'px-2 py-1 text-xs': computedStyles.sizeVariant === 'sm',
                 'px-3 py-2 text-sm': computedStyles.sizeVariant === 'md',
                 'px-4 py-3 text-base': computedStyles.sizeVariant === 'lg',
                 'opacity-50 cursor-not-allowed': disabled
               }" [style.color]="isFocused ? computedStyles.activeTextColor : computedStyles.textColor" />
  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>
</div>
