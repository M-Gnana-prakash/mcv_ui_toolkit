<div class="mcv-radio-group">

  @if (label) {
  <label class="mcv-label" [style.color]="computedStyles.labelColor" [ngClass]="{
                  'text-sm': computedStyles.sizeVariant === 'sm',
                  'text-md': computedStyles.sizeVariant === 'md',
                  'text-lg': computedStyles.sizeVariant === 'lg',
                  'disabled': disabled
                }">
    {{ label }} @if(required){<span class="required-star">*</span>}
  </label>
  }

  <div class="mcv-radio-list" [ngClass]="{
      'mcv-radio-list-vertical': layout === 'vertical',
      'mcv-radio-list-horizontal': layout === 'horizontal'
    }">
    @for (option of options; track option.value) {
    <label class="mcv-radio-item" [class.disabled]="disabled || option.disabled">

      <input type="radio" [name]="name" [value]="option.value" [checked]="value === option.value"
        [disabled]="disabled || option.disabled" (click)="onOptionChange(option.value)" (blur)="onBlur()"
        class="mcv-hidden-input">

      <!-- Custom Radio Circle -->
      <div class="mcv-radio-circle"
        [style.border-color]="value === option.value ? computedStyles.selectedColor : computedStyles.borderStyle"
        [style.background-color]="computedStyles.backgroundColor" [ngClass]="{
               'size-sm': computedStyles.sizeVariant === 'sm',
               'size-md': computedStyles.sizeVariant === 'md',
               'size-lg': computedStyles.sizeVariant === 'lg'
             }">
        <!-- Inner dot -->
        <div class="mcv-radio-dot" [style.background-color]="computedStyles.selectedColor"
          [class.checked]="value === option.value" [ngClass]="{
                  'dot-sm': computedStyles.sizeVariant === 'sm',
                  'dot-md': computedStyles.sizeVariant === 'md',
                  'dot-lg': computedStyles.sizeVariant === 'lg'
                }"></div>
      </div>

      <span [style.color]="computedStyles.labelColor" [ngClass]="{
                        'text-sm': computedStyles.sizeVariant === 'sm',
                        'text-md': computedStyles.sizeVariant === 'md',
                        'text-lg': computedStyles.sizeVariant === 'lg'
                      }">
        {{ option.label }}
      </span>
    </label>
    }
  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>
</div>
