<div class="mcv-toggle-wrapper">
  <div class="mcv-toggle-row">

    <!-- Toggle Button -->
    <button type="button" (click)="toggle($event)" [disabled]="disabled" class="mcv-toggle-btn" [ngClass]="{
        'size-sm': computedStyles.sizeVariant === 'sm',
        'size-md': computedStyles.sizeVariant === 'md',
        'size-lg': computedStyles.sizeVariant === 'lg',
        'focus:ring-2': true
      }" [style.background-color]="value ? computedStyles.selectedColor : computedStyles.trackColor">

      <!-- Knob -->
      <span class="mcv-toggle-thumb" [ngClass]="{
          'thumb-sm': computedStyles.sizeVariant === 'sm',
          'thumb-md': computedStyles.sizeVariant === 'md',
          'thumb-lg': computedStyles.sizeVariant === 'lg',
          'checked-sm': value && computedStyles.sizeVariant === 'sm',
          'checked-md': value && computedStyles.sizeVariant === 'md',
          'checked-lg': value && computedStyles.sizeVariant === 'lg'
        }" [style.background-color]="computedStyles.thumbColor">
      </span>
    </button>

    <!-- Label + Yes/No -->
    @if (label || onLabel || offLabel) {
    <span class="mcv-toggle-label" [style.color]="computedStyles.labelColor" [ngClass]="{
          'text-sm': computedStyles.sizeVariant === 'sm',
          'text-md': computedStyles.sizeVariant === 'md',
          'text-lg': computedStyles.sizeVariant === 'lg',
          'opacity-50': disabled
        }">
      {{ label }} {{ value ? onLabel : offLabel }}
    </span>
    }

  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>
</div>
