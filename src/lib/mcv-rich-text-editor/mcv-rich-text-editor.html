<div class="mcv-field-wrapper">
    @if (label) {
    <label class="mcv-label" [ngClass]="{
                'label-sm': computedStyles.sizeVariant === 'sm',
                'label-md': computedStyles.sizeVariant === 'md',
                'label-lg': computedStyles.sizeVariant === 'lg'
            }">
        {{ label }} @if(required){<span class="required-star">*</span>}
    </label>
    }

    <div class="mcv-rich-text-container" [class.disabled]="disabled">
        <quill-editor [(ngModel)]="value" [placeholder]="placeholder" [readOnly]="readonly" [modules]="modules"
            (onContentChanged)="onContentChanged($event)" (onEditorFocus)="onFocus()" (onEditorBlur)="onBlur()"
            [style.backgroundColor]="computedStyles.backgroundColor"
            [style.color]="computedStyles.textColor"></quill-editor>
    </div>

    <!-- Validation -->
    <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
    </mcv-field-errors>
</div>
