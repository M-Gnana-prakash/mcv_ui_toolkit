<div class="mcv-field-wrapper">

    @if (label) {
    <label class="mcv-label" [ngClass]="{
            'label-sm': computedStyles.sizeVariant === 'sm',
            'label-md': computedStyles.sizeVariant === 'md',
            'label-lg': computedStyles.sizeVariant === 'lg'
        }">
        {{ label }} @if(required){<span class="required-star">*</span>}
    </label>
    }

    <div class="mcv-input-container"
        [style.border]="isFocused ? computedStyles.activeBorderStyle : computedStyles.borderStyle"
        [style.outline]="isFocused ? computedStyles.activeOutline : computedStyles.outline"
        [style.background-color]="isFocused ? computedStyles.activeBackgroundColor : computedStyles.backgroundColor">

        <input #inputField [type]="type" [placeholder]="placeholder" [disabled]="disabled" [readOnly]="readonly"
            [minLength]="minLength" [maxLength]="maxLength === Infinity ? null : maxLength" [value]="value"
            (input)="onInputChange($event)" (focus)="isFocused = true" (blur)="onBlur()" class="mcv-input-field"
            [ngClass]="[
                 computedStyles.sizeVariant === 'sm' ? 'size-sm' : '',
                 computedStyles.sizeVariant === 'md' ? 'size-md' : '',
                 computedStyles.sizeVariant === 'lg' ? 'size-lg' : '',
                 inputClass
               ]"
            [style.color]="isFocused ? (computedStyles.activeTextColor || null) : (computedStyles.textColor || null)" />
    </div>

    <!-- Validation -->
    <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
    </mcv-field-errors>
</div>
