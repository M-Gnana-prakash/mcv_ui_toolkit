<div class="mcv-field-wrapper">
  @if (label) {
  <label class="mcv-label" [ngClass]="{
            'size-sm': computedStyles.sizeVariant === 'sm',
            'size-md': computedStyles.sizeVariant === 'md',
            'size-lg': computedStyles.sizeVariant === 'lg'
        }">
    {{ label }} @if(required){<span class="required-star">*</span>}
  </label>
  }

  <div class="mcv-input-container" [style.border]="(isFocused || isSelectFocused)
      ? computedStyles.activeBorderStyle
      : computedStyles.borderStyle" [style.outline]="(isFocused || isSelectFocused)
      ? computedStyles.activeOutline
      : computedStyles.outline" [style.background-color]="(isFocused || isSelectFocused)
      ? computedStyles.activeBackgroundColor
      : computedStyles.backgroundColor">
    <!-- Country code dropdown -->
    @if (showCountryCode) {
    <select [(ngModel)]="countryCode" (ngModelChange)="isTouched = true" (focus)="isSelectFocused = true"
      (blur)="isSelectFocused = false" [disabled]="disabled" class="mcv-country-select" [ngClass]="{
          'size-sm select-sm': computedStyles.sizeVariant === 'sm',
          'size-md select-md': computedStyles.sizeVariant === 'md',
          'size-lg select-lg': computedStyles.sizeVariant === 'lg'
        }" [style.border-right]="(isFocused || isSelectFocused)
          ? computedStyles.activeBorderStyle
          : computedStyles.borderStyle" [style.border-right-width]="'1px'" [style.color]="(isFocused || isSelectFocused)
          ? computedStyles.activeTextColor
          : computedStyles.textColor">
      @for (item of countryCodes; track item.code) {
      <option [value]="item.code">{{ item.code }}</option>
      }
    </select>
    }

    <!-- Phone Input -->
    <input [(ngModel)]="value" (ngModelChange)="isTouched = true" [placeholder]="placeholder" [disabled]="disabled"
      [readOnly]="readonly" (focus)="isFocused = true" (blur)="onBlur()" class="mcv-phone-input" [ngClass]="{
        'size-sm': computedStyles.sizeVariant === 'sm',
        'size-md': computedStyles.sizeVariant === 'md',
        'size-lg': computedStyles.sizeVariant === 'lg'
      }" [style.color]="(isFocused || isSelectFocused)
        ? computedStyles.activeTextColor
        : computedStyles.textColor" />
  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>
</div>
