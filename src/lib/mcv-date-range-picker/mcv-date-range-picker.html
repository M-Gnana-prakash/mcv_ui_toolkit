<div class="mcv-range-wrapper calendar-wrapper">
  @if (label) {
  <label class="mcv-label" [style.color]="computedStyles.labelColor" [ngClass]="{
            'label-sm': computedStyles.sizeVariant === 'sm',
            'label-md': computedStyles.sizeVariant === 'md',
            'label-lg': computedStyles.sizeVariant === 'lg'
        }">
    {{ label }} @if(required){<span class="required-star">*</span>}
  </label>
  }

  <!-- Input -->
  <div class="mcv-input-container">
    <input [disabled]="disabled" readonly (click)="toggle()" [value]="format(start) + (end ? ' – ' + format(end) : '')"
      placeholder="Enter a date range" class="mcv-range-input" [style.border]="computedStyles.borderStyle"
      [style.background-color]="computedStyles.backgroundColor" [style.color]="computedStyles.textColor" [ngClass]="{
          'size-sm': computedStyles.sizeVariant === 'sm',
          'size-md': computedStyles.sizeVariant === 'md',
          'size-lg': computedStyles.sizeVariant === 'lg'
      }" />

    <span (click)="toggle()" class="mcv-calendar-icon" [style.color]="computedStyles.selectedColor">
      📅
    </span>
  </div>

  <!-- Validation -->
  <mcv-field-errors [errors]="errors" [show]="needValidationStatusMessage && errors.length > 0 && isTouched">
  </mcv-field-errors>

  <!-- Popup -->
  @if (show) {
  <div class="mcv-calendar-popup">

    <!-- Header -->
    <div class="mcv-calendar-header">

      <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 600; color: #374151;">
        <select class="mcv-month-select" [value]="current.getMonth()" (change)="setMonth($any($event.target).value)">
          @for (m of months; track m; let i = $index) {
          <option [value]="i" [selected]="current.getMonth() === i">
            {{ m }}
          </option>
          }
        </select>
      </div>

      <div class="mcv-nav-btns">
        <button type="button" (click)="change(-1)" class="mcv-nav-btn">‹</button>
        <button type="button" (click)="change(1)" class="mcv-nav-btn">›</button>
      </div>

    </div>

    <!-- Weekdays -->
    <div class="mcv-weekdays">
      @for (d of ['S','M','T','W','T','F','S']; track $index) {
      <div>
        {{ d }}
      </div>
      }
    </div>

    <!-- Dates -->
    <div class="mcv-days-grid">

      @for (d of days; track $index) {
      <div (click)="d && select(d)" class="mcv-day-cell">

        @if (d) {
        <!-- Range background -->
        @if (inRange(d)) {
        <div class="mcv-range-bg" [style.background-color]="computedStyles.selectedColor">
        </div>
        }

        <!-- Date circle -->
        <div class="mcv-day-circle" [ngClass]="{
            'mcv-edge-day': isEdge(d)
          }" [style.background-color]="isEdge(d) ? computedStyles.selectedColor : 'transparent'">
          {{ d.getDate() }}
        </div>
        }

      </div>
      }

    </div>

  </div>
  }

</div>
